name: Build and Release Portable Application

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: 3.9.6  # 使用嵌入式Python版本
  APP_NAME: "LCTA"
  TESTER_NAME: "无法打开？运行环境检测"
  PYINSTALLER_ARGU: "--add-data \"LCTA_backup/config_default.json;.\" --add-data \"LCTA_backup/config_check.json;.\" --add-data \"LCTA_backup/webui;webui\" -i \"LCTA_backup/favicon.ico\""

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        path: LCTA

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Init code for release
      run: |
        python -m pip install requests
        python .\LCTA\.github\InitCode.py
      env:
        PYTHONIOENCODING: utf-8        
    - name: setup-path
      run: |
        Copy-Item -Path .\LCTA -Destination .\LCTA_backup -Recurse
        Copy-Item -Path .\LCTA -Destination .\LCTA_update -Recurse
        mkdir release
        mkdir release/${{ env.APP_NAME }}
        mkdir release/${{ env.APP_NAME }}/code
        mkdir release/${{ env.APP_NAME }}-Compatible
        mkdir release/${{ env.APP_NAME }}-Compatible/code
    
    - name: Setup MSYS2 and MinGW (for C compilation)
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >-
          mingw-w64-x86_64-toolchain
    
    - name: Compile C launcher
      run: |
        # 使用现有的favicon.ico作为图标
        Copy-Item .\LCTA_backup\favicon.ico .\launcher.ico
        
        # 创建资源文件
        echo "1 ICON \"launcher.ico\"" > launcher.rc
        # 编译资源文件为目标文件
        windres launcher.rc -o launcher_res.o
        
        # 编译C启动器并链接图标资源
        gcc -O2 -o launcher.exe launcher.c launcher_res.o -lshlwapi
        strip launcher.exe
        mv launcher.exe release\${{ env.APP_NAME }}\launcher.exe
        
        gcc -O2 -o launcher_debug.exe launcher_debug.c launcher_res.o -lshlwapi
        strip launcher_debug.exe
        mv launcher_debug.exe release\${{ env.APP_NAME }}\launcher_debug.exe
        
        gcc -O2 -o launcher.exe launcher_qt.c launcher_res.o -lshlwapi
        strip launcher.exe
        mv launcher.exe release\${{ env.APP_NAME }}-Compatible\launcher.exe
        
        gcc -O2 -o launcher_debug.exe launcher_qt_debug.c launcher_res.o -lshlwapi
        strip launcher_debug.exe
        mv launcher_debug.exe release\${{ env.APP_NAME }}-Compatible\launcher_debug.exe

        gcc -O2 -o tester.exe test.c launcher_res.o -lshlwapi
        strip tester.exe
        cp tester.exe release\${{ env.APP_NAME }}\${{ env.TESTER_NAME }}.exe
        mv tester.exe release\${{ env.APP_NAME }}-Compatible\${{ env.TESTER_NAME }}.exe
    - name: Install Dependencies
      run: |
        python -m venv venv
        .\venv\Scripts\activate
        python -m pip install pip --upgrade
        pip install -r LCTA\requirements.txt
        python -c "from pathlib import Path;session=Path(r'venv\Lib\site-packages\requests\sessions.py');
        session.write_text(session.read_text(encoding='utf-8').replace('verify=None,', 'verify=False,'),encoding='utf-8')"
    - name: Install Embedded Python
      run: |
        Invoke-WebRequest -Uri https://www.python.org/ftp/python/${{ env.PYTHON_VERSION }}/python-${{ env.PYTHON_VERSION }}-embed-amd64.zip -OutFile ../python.zip
        New-Item -ItemType Directory -Path venv/Bins
        Expand-Archive -Path ../python.zip -DestinationPath venv/Bins
        Add-Content -Path venv/Bins/*._pth -Value "import site"
    
    - name: copy files
      run: |
        dir LCTA -Recurse
        dir release -Recurse
        Copy-Item LCTA\* release\${{ env.APP_NAME }}\code\ -Recurse -Force
        Copy-Item venv release\${{ env.APP_NAME }}\code\venv -Recurse
        Copy-Item LCTA\* release\${{ env.APP_NAME }}-Compatible\code\ -Recurse -Force
        Copy-Item venv release\${{ env.APP_NAME }}-Compatible\code\venv -Recurse
        release\${{ env.APP_NAME }}-Compatible\code\venv\Bins\python.exe -m pip install PyQt5 qtpy PyQtWebEngine

    - name: Upload Compatible portable application folder
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-Portable-Full-Compatible
        path: |
          release/${{ env.APP_NAME }}-Compatible
        retention-days: 7

    - name: Upload portable application folder
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-Portable-Full
        path: |
          release/${{ env.APP_NAME }}
        retention-days: 7

    - name: Upload update folder
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-update
        path: |
          ./LCTA_update
        retention-days: 7

    # 压缩文件夹为ZIP文件
    - name: Create ZIP archives
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        # 压缩便携版完整文件夹
        Compress-Archive -Path release/${{ env.APP_NAME }} -DestinationPath release/${{ env.APP_NAME }}-Portable-Full.zip
        Compress-Archive -Path release/${{ env.APP_NAME }}-Compatible -DestinationPath release/${{ env.APP_NAME }}-Portable-Full-Compatible.zip
        
        # 压缩更新文件夹
        Remove-Item -Path ./LCTA_update/.git -Recurse -Force
        Compress-Archive -Path ./LCTA_update/* -DestinationPath release/${{ env.APP_NAME }}-update.zip

    # 创建 GitHub Release（仅当推送的是 tag 时）
    - name: Create Release on Tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        name: LCTA ${{ github.ref_name }}
        body_path: ./update.md
        draft: false
        prerelease: false
        files: |
          release/${{ env.APP_NAME }}-Portable-Full.zip
          release/${{ env.APP_NAME }}-Portable-Full-Compatible.zip
          release/${{ env.APP_NAME }}-update.zip
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.LCTA_RELEASER }}
