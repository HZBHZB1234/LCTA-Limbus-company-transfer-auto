<!-- 气泡模组页面 -->
<div class="section-header">
    <h2 class="section-title">
        <i class="fas fa-comment-dots"></i>
        气泡模组
    </h2>
    <p class="section-subtitle">下载和安装气泡文本模组</p>
</div>

<div class="settings-grid">
    <div class="setting-card">
        <h3 class="setting-title">气泡文本下载配置</h3>
        <div class="form-group">
            <label class="checkbox-container">
                <input type="checkbox" id="bubble-color">
                <span class="checkmark"></span>
                下载有颜色的气泡文本
            </label>
        </div>
        <div class="form-group">
            <label class="checkbox-container">
                <input type="checkbox" id="bubble-llc">
                <span class="checkmark"></span>
                下载随机加载文本
            </label>
        </div>
        <div class="form-group">
            <label class="checkbox-container">
                <input type="checkbox" id="bubble-install" checked>
                <span class="checkmark"></span>
                立即安装
            </label>
        </div>
        <div class="action-area">
            <button class="primary-btn" onclick="downloadBubble()">
                <i class="fas fa-download"></i>
                下载(安装)气泡文本
            </button>
        </div>
    </div>
</div>
