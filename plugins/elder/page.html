<!-- 老年人模式页面 -->
<div class="section-header">
    <h2 class="section-title">
        <i class="fas fa-compass"></i>
        老年人模式
    </h2>
    <p class="section-subtitle">简单方便，不需要动脑的指引程序</p>
</div>

<div class="question-container">
    <div class="about-card">
        <div class="markdown-body">
            <div class="quetion-content"></div>
        </div>
        <div id="elder-container"></div>
    </div>
</div>

<div class="settings-grid">
    <div class="setting-card">
        <h3 class="setting-title">向导配置</h3>
        <div class="form-group">
            <label class="checkbox-container">
                <input type="checkbox" id="elder-character-base" checked>
                <span class="checkmark"></span>
                基础设置向导
            </label>
        </div>
        <div class="form-group">
            <label class="checkbox-container">
                <input type="checkbox" id="elder-character-launcher" checked>
                <span class="checkmark"></span>
                启动器配置向导
            </label>
        </div>
        <div class="form-group">
            <label class="checkbox-container">
                <input type="checkbox" id="elder-character-translate" checked>
                <span class="checkmark"></span>
                翻译配置向导
            </label>
        </div>
        <div class="form-group">
            <label class="checkbox-container">
                <input type="checkbox" id="elder-character-manage" checked>
                <span class="checkmark"></span>
                管理配置向导
            </label>
        </div>
    </div>
</div>
