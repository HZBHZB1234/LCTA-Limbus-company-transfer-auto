<!-- 应用更新页面 -->
<div class="section-header">
    <h2 class="section-title">
        <i class="fas fa-info-circle"></i>
        关于 LCTA
    </h2>
    <p class="section-subtitle">边狱公司汉化工具箱</p>
</div>

<div class="about-container">
    <div class="about-card">
        <div class="about-header">
            <div class="about-logo">
                <i class="fas fa-language"></i>
            </div>
            <div class="about-title">
                <h3>LCTA - 边狱公司汉化工具箱</h3>
                <p class="version-badge">版本 5.0.0</p>
            </div>
        </div>
        <div class="markdown-body">
            <div class="about-content"></div>
        </div>
    </div>

    <div class="about-card">
        <div class="about-header">
            <div class="about-logo">
                <i class="fas fa-sync-alt"></i>
            </div>
            <div class="about-title">
                <h3>更新内容</h3>
                <p class="version-badge">版本 5.0.0</p>
            </div>
        </div>
        <div class="markdown-body">
            <div class="update-content"></div>
        </div>
    </div>

    <div class="about-card">
        <div class="about-header">
            <div class="about-logo">
                <i class="fas fa-compass"></i>
            </div>
            <div class="about-title">
                <h3>引导</h3>
                <p class="version-badge">版本 5.0.0</p>
            </div>
        </div>
        <div class="markdown-body">
            <div class="use-help"></div>
        </div>
    </div>
</div>

<div class="settings-grid">
    <div class="setting-card">
        <h3 class="setting-title">更新选项</h3>
        <div class="form-group">
            <label class="checkbox-container">
                <input type="checkbox" id="auto-check-update" checked>
                <span class="checkmark"></span>
                启动时自动检查更新
            </label>
        </div>
        <div class="form-group">
            <label class="checkbox-container">
                <input type="checkbox" id="delete-updating">
                <span class="checkmark"></span>
                更新时删除废弃的包
            </label>
        </div>
        <div class="form-group">
            <label class="checkbox-container">
                <input type="checkbox" id="update-use-proxy" checked>
                <span class="checkmark"></span>
                更新通过镜像加速
            </label>
        </div>
        <div class="form-group">
            <label class="checkbox-container">
                <input type="checkbox" id="update-only-stable">
                <span class="checkmark"></span>
                仅更新稳定版本
            </label>
        </div>
        <div class="action-area">
            <button class="primary-btn" onclick="checkUpdate()">
                <i class="fas fa-sync-alt"></i>
                检查更新
            </button>
            <button class="primary-btn" onclick="doUpdate()">
                <i class="fas fa-download"></i>
                执行更新
            </button>
        </div>
    </div>
</div>
