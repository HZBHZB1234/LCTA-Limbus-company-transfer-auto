<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCTA - 边狱公司汉化工具箱</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout-extras.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown-light.min.css">
</head>
<body class="theme-light">
    <div class="theme-toggle">
        <button class="theme-btn active" data-theme="light" title="亮色主题">
            <i class="fas fa-sun"></i>
        </button>
        <button class="theme-btn" data-theme="dark" title="暗色主题">
            <i class="fas fa-moon"></i>
        </button>
        <button class="theme-btn" data-theme="purple" title="蓝紫色主题">
            <i class="fas fa-palette"></i>
        </button>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <button class="sidebar-toggle" onclick="toggleSidebar()" title="折叠侧边栏">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo">
                <i class="fas fa-language"></i>
                <h2>LCTA <span class="version">v5.0.0</span></h2>
            </div>
            <p class="subtitle">边狱公司汉化工具箱</p>
        </div>

        <div class="sidebar-menu">
            <!-- 常用工具组 -->
            <div class="nav-group">
                <div class="nav-group-title">
                    <i class="fas fa-star"></i> 常用工具
                </div>
                <button id="dashboard-btn" class="nav-btn" style="display:none;">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>首页</span>
                </button>
                <button id="translate-btn" class="nav-btn">
                    <i class="fas fa-language"></i>
                    <span>翻译工具</span>
                </button>
                <button id="download-btn" class="nav-btn">
                    <i class="fas fa-cloud-download-alt"></i>
                    <span>汉化包下载</span>
                </button>
                <button id="install-btn" class="nav-btn">
                    <i class="fas fa-download"></i>
                    <span>安装已有汉化</span>
                </button>
                <button id="fancy-btn" class="nav-btn">
                    <i class="fas fa-paint-brush"></i>
                    <span>文本美化</span>
                </button>
                <button id="cdn-btn" class="nav-btn">
                    <i class="fas fa-bolt"></i>
                    <span>CDN优选</span>
                </button>
                <button id="speed-btn" class="nav-btn">
                    <i class="fas fa-forward"></i>
                    <span>游戏加速</span>
                </button>
            </div>

            <!-- 管理配置组 -->
            <div class="nav-group">
                <div class="nav-group-title">
                    <i class="fas fa-sliders-h"></i> 管理配置
                </div>
                <button id="manage-btn" class="nav-btn">
                    <i class="fas fa-archive"></i>
                    <span>已安装数据管理</span>
                </button>
                <button id="launcher-config-btn" class="nav-btn">
                    <i class="fas fa-rocket"></i>
                    <span>Launcher配置</span>
                </button>
                <button id="config-btn" class="nav-btn">
                    <i class="fas fa-cog"></i>
                    <span>配置汉化API</span>
                </button>
                <button id="proper-btn" class="nav-btn">
                    <i class="fas fa-book"></i>
                    <span>抓取专有词汇</span>
                </button>
            </div>

            <!-- 系统组 -->
            <div class="nav-group">
                <div class="nav-group-title">
                    <i class="fas fa-server"></i> 系统
                </div>
                <button id="log-btn" class="nav-btn">
                    <i class="fas fa-clipboard-list"></i>
                    <span>日志</span>
                </button>
                <button id="settings-btn" class="nav-btn">
                    <i class="fas fa-wrench"></i>
                    <span>设置</span>
                </button>
                <button id="about-btn" class="nav-btn">
                    <i class="fas fa-info-circle"></i>
                    <span>关于</span>
                </button>
            </div>

            <!-- 特殊（默认隐藏） -->
            <div class="nav-group hidden-nav-items" style="display:none;">
                <button id="welcome-btn" class="nav-btn" style="display: none;">
                    <i class="fas fa-user-circle"></i>
                    <span>欢迎</span>
                </button>
                <button id="elder-btn" class="nav-btn" style="display: none;">
                    <i class="fas fa-compass"></i>
                    <span>设置向导</span>
                </button>
                <button id="clean-btn" class="nav-btn" style="display: none;">
                    <i class="fas fa-broom"></i>
                    <span>清除本地缓存</span>
                </button>
                <button id="test-btn" class="nav-btn" style="display: none;">
                    <i class="fas fa-flask"></i>
                    <span>测试界面</span>
                </button>
            </div>
        </div>

        <!-- 侧边栏搜索 -->
        <div class="sidebar-search">
            <i class="fas fa-search"></i>
            <input type="text" id="sidebar-search-input" placeholder="搜索功能或帮助..."
                   oninput="onSidebarSearch(this.value)">
        </div>

        <div class="sidebar-footer">
            <div class="status-indicator">
                <div class="status-dot connected"></div>
                <span>已连接</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="content-section active" id="dashboard-section"></div>
        <div class="content-section" id="translate-section"></div>
        <div id="install-section" class="content-section"></div>
        <div id="download-section" class="content-section"></div>
        <div id="clean-section" class="content-section"></div>
        <div id="fancy-section" class="content-section"></div>
        <div id="manage-section" class="content-section"></div>
        <div id="config-section" class="content-section"></div>
        <div id="proper-section" class="content-section"></div>
        <div id="about-section" class="content-section"></div>
        <div id="welcome-section" class="content-section"></div>
        <div id="elder-section" class="content-section"></div>
        <div id="log-section" class="content-section"></div>
        <div id="settings-section" class="content-section"></div>
        <div id="launcher-config-section" class="content-section"></div>
        <div id="cdn-section" class="content-section"></div>
        <div id="test-section" class="content-section"></div>
        <div id="speed-section" class="content-section"></div>
    </div>



    <!-- 模态窗口容器 -->
    <div id="modal-container"></div>

    <!-- 最小化窗口容器 -->
    <div id="minimized-container"></div>

    <!-- 帮助抽屉 -->
    <div class="help-drawer-overlay" id="help-drawer-overlay" onclick="helpDrawer.close()"></div>
    <div class="help-drawer" id="help-drawer">
        <div class="help-drawer-header">
            <div class="help-drawer-title">
                <i class="fas fa-question-circle"></i>
                <span>LCTA 帮助中心</span>
            </div>
            <button class="help-drawer-close" onclick="helpDrawer.close()" title="关闭 (Esc)">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="help-drawer-tabs">
            <button class="help-drawer-tab active" data-tab="page-help" onclick="helpDrawer.switchTab('page-help')">
                <i class="fas fa-file-alt"></i> 页面帮助
            </button>
            <button class="help-drawer-tab" data-tab="guide" onclick="helpDrawer.switchTab('guide')">
                <i class="fas fa-book"></i> 使用指南
            </button>
            <button class="help-drawer-tab" data-tab="faq" onclick="helpDrawer.switchTab('faq')">
                <i class="fas fa-comments"></i> 常见问题
            </button>
        </div>
        <div class="help-drawer-body markdown-body" id="help-drawer-body">
            <div class="help-drawer-loading">
                <i class="fas fa-spinner fa-spin"></i>&nbsp; 加载中...
            </div>
        </div>
        <div class="help-drawer-footer">
            <i class="fas fa-lightbulb"></i>
            提示：在任意页面长按 <kbd>W</kbd> 键 2 秒即可打开帮助
        </div>
    </div>

    <script src="sections/preload.js"></script>
    <script src="js/core.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/list-managers.js"></script>
    <script src="js/features.js"></script>
    <script src="js/init.js"></script>
    <script src="js/cdn.js"></script>
    <script src="js/speed.js"></script>
</body>
</html>
